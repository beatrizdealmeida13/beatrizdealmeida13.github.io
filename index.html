<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khuyến Mãi Đặc Biệt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.banner{
    position:relative;
    width:100vw;
    height:100vh;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.15);
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

.text{
    font-size:65px;
    font-weight:900;
    text-transform:uppercase;
    color:#ffeb3b;

    text-shadow:
        0 1px 0 #ccc,
        0 2px 0 #c9c9c9,
        0 3px 0 #bbb,
        0 4px 0 #b9b9b9,
        0 5px 0 #aaa,
        0 6px 12px rgba(0,0,0,.8);

    background:rgba(0,0,0,.45);
    padding:20px 40px;
    border-radius:15px;

    animation:pulse 1.5s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
    }
}

.button{
    display:inline-block;
    margin-top:25px;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    font-size:26px;
    font-weight:bold;
    padding:18px 45px;
    border-radius:50px;

    box-shadow:
        0 0 15px rgba(255,0,0,.8),
        0 0 30px rgba(255,0,0,.5);

    transition:.3s;
}

.button:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="banner">

    <a href="https://24h.com.vn" target="_blank">
        <img src="nen_n.jpg" alt="Khuyến mãi">
        <div class="overlay"></div>
    </a>

    <div class="content">

        <div class="text">
            🎁 Meta Partner Invoice Program 🎁
        </div>

        <br>

        <a class="button"
           href="https://24h.com.vn"
           target="_blank">
            Join Now
        </a>

    </div>

</div>

</body>
</html>
