<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="zHDgPYCpEnzmjA1_kf3mgr9sWLgq_sok85vaERmgJLk" 
    <title>Web đọc báo</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 30%;
            background: #f4f4f4;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
        }
        .content {
            width: 70%;
            padding: 20px;
        }
        .article {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .article:hover {
            background: #ddd;
        }
        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📰 Tin tức</h2>
    <div class="article" onclick="loadArticle(0)">Tin 1: Công nghệ mới</div>
    <div class="article" onclick="loadArticle(1)">Tin 2: Thế giới</div>
    <div class="article" onclick="loadArticle(2)">Tin 3: Thể thao</div>
</div>

<div class="content">
    <h2 id="title">Chọn bài báo</h2>
    <p id="content">Nội dung sẽ hiển thị ở đây...</p>
</div>

<script>
    const articles = [
        {
            title: "Công nghệ AI 2026",
            content: "AI đang phát triển rất nhanh và thay đổi thế giới..."
        },
        {
            title: "Tin tức thế giới",
            content: "Nhiều sự kiện quan trọng đang diễn ra trên toàn cầu..."
        },
        {
            title: "Thể thao hôm nay",
            content: "Các trận đấu hấp dẫn đang thu hút người hâm mộ..."
        }
    ];

    function loadArticle(index) {
        document.getElementById("title").innerText = articles[index].title;
        document.getElementById("content").innerText = articles[index].content;
    }
</script>

</body>
</html>
